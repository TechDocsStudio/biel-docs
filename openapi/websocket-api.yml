asyncapi: 3.0.0
info:
  title: Biel.ai WebSocket API
  version: 1.0.0
  description: >
    Real-time streaming chat API for Biel.ai projects.
    Uses the same authentication and domain restrictions as the REST API.

servers:
  newChat:
    host: app.biel.ai
    pathname: /ws/messages/{projectSlug}
    protocol: wss
    description: Start a new chat session.
    variables:
      projectSlug:
        description: Project slug identifier.
        examples:
          - jfvzioa17q
  existingChat:
    host: app.biel.ai
    pathname: /ws/messages/chat/{chatId}
    protocol: wss
    description: Continue an existing chat session.
    variables:
      chatId:
        description: Chat session UUID.

channels:
  chat:
    address: chat
    description: Channel for exchanging chat messages between user and AI.
    messages:
      sendMessage.message:
        contentType: application/json
        payload:
          type: object
          required:
            - from
            - message
          properties:
            projectId:
              type: string
              description: Project slug.
            chatId:
              type: string
              description: Chat session UUID. Omit for the first message.
            from:
              type: string
              enum:
                - user
              description: Always `user`.
            message:
              type: string
              description: Message content (Markdown, max 1000 characters).
            url:
              type: string
              description: Page URL where the chat is happening. Used for domain validation.
            email:
              type: string
              description: Email or ID for conversation tracking.
            apiKey:
              type: string
              description: API key with `chat_create` permission. Required for private projects.
            thinkMode:
              type: boolean
              description: Enable reasoning mode for deeper analysis.
            metadata:
              type: string
              description: Tag to identify the conversation source (e.g., `mcp`, `web`).
      receiveMessage.message:
        contentType: application/json
        payload:
          type: object
          properties:
            projectId:
              type: string
              description: Project slug.
            chatId:
              type: string
              description: Chat session UUID.
            from:
              type: string
              enum:
                - ai
              description: Always `ai`.
            messageId:
              type: string
              description: Message UUID. Only present in the final message.
            message:
              type: string
              description: Response content (Markdown).
            timestamp:
              type: string
              format: date-time
              description: ISO 8601 timestamp.
            isPartial:
              type: boolean
              description: "`true` for streaming tokens, `false` for the final message."
            sources:
              type: array
              description: Source references. Only present in the final message.
              items:
                type: object
                properties:
                  title:
                    type: string
                    description: Source page title.
                  url:
                    type: string
                    description: Source URL.
            incomplete:
              type: boolean
              description: "`true` if the response was cut short due to token limits."

operations:
  sendMessage:
    action: receive
    channel:
      $ref: '#/channels/chat'
    summary: Send a message from the user.
    messages:
      - $ref: '#/channels/chat/messages/sendMessage.message'
  receiveMessage:
    action: send
    channel:
      $ref: '#/channels/chat'
    summary: Receive streaming responses from the AI.
    messages:
      - $ref: '#/channels/chat/messages/receiveMessage.message'
